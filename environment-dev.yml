name: jax_karmma_dev
channels:
  - conda-forge
dependencies:
  - python=3.12
  - jax=0.10.2
  - jaxlib=0.10.2
  - ducc0=0.41.0
  - getdist=1.7.7
  - pyccl=3.3.4
  - namaster=2.7
  - skyproj=2.5.0
  - treecorr=5.1.3
  - healpy=1.19.0
  - h5py=3.16.0
  - numpy=2.5.1
  - scipy=1.18.0
  - matplotlib=3.11.0
  - astropy=8.0.1
  - pandas=3.0.3
  - pyyaml=6.0.3
  - ipykernel=7.3.0
  - tqdm=4.68.4
  - joblib=1.5.3
  - ruff=0.15.21
  - pip
  - pip:
      # Tracks blackjax's main branch (unreleased). `conda env update` will
      # re-fetch the latest commit each time this env is rebuilt.
      - git+https://github.com/blackjax-devs/blackjax.git@main
      # Required for blackjax.progress_bar(); not on conda-forge.
      - jax-tap>=0.3.0
