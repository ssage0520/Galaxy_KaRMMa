name: jax_karmma
channels:
  - conda-forge
dependencies:
  - python=3.12
  - jax=0.10.2
  - jaxlib=0.10.2
  - blackjax=1.6
  - ducc0=0.41.0
  - getdist=1.7.7
  - pyccl=3.3.4
  - namaster=2.7
  - skyproj=2.5.0
  - treecorr=5.1.3
  - healpy=1.19.0
  - h5py=3.16.0
  - numpy=2.5.1
  - scipy=1.18.0
  - matplotlib=3.10.8  # 3.11.0's new text engine needs libraqm, which needs glibc>=2.28 — too new for this HPC's OS
  - pypalettes=0.2.1
  - astropy=8.0.1
  - pandas=3.0.3
  - pyyaml=6.0.3
  - ipykernel=7.3.0
  - tqdm=4.68.4
  - joblib=1.5.3
  - ruff=0.15.21
  - pip
  - pip:
      # Required for blackjax.progress_bar(); not on conda-forge.
      - jax-tap>=0.3.0
